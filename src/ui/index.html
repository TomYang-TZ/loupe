<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loupe</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <div class="logo">loupe<span class="logo-cursor">_</span></div>
    <div class="stats">
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme (⌘T)" aria-label="Switch to light theme">
        <svg class="sun-and-moon" aria-hidden="true" width="14" height="14" viewBox="0 0 24 24">
          <mask class="moon" id="moon-mask">
            <rect x="0" y="0" width="100%" height="100%" fill="white" />
            <circle cx="24" cy="10" r="6" fill="black" />
          </mask>
          <circle class="sun" cx="12" cy="12" r="6" mask="url(#moon-mask)" fill="currentColor" />
          <g class="sun-beams" stroke="currentColor">
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </g>
        </svg>
      </button>
      <span><span class="conn-dot connecting" id="conn-dot"></span><span id="conn-status">connecting</span></span>
      <span><span class="stat-val" id="line-count">0</span> events</span>
      <button class="scope-btn" id="view-toggle-btn" onclick="toggleView()" title="Map (m)"><div class="scope-icon"><svg class="scope-tube" viewBox="0 0 20 10" fill="currentColor"><rect x="2" y="3" width="16" height="5" rx="1.5"/><rect x="0" y="2" width="5" height="7" rx="1"/></svg><svg class="scope-stand" viewBox="0 0 12 8" fill="currentColor"><path d="M3 0 L6 8 L9 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div></button>
      <span class="lock-wrap" title="Pin window (⌘⇧H)"><input type="checkbox" id="lock-toggle" checked onchange="toggleLock()"><label class="lock-label" for="lock-toggle"><div class="lock-wrapper"><div class="shackle"></div><svg class="lock-body" viewBox="0 0 15 10" fill="white"><rect width="15" height="10" rx="2"/></svg></div></label></span>
      <button class="mode-toggle-btn" id="mode-toggle-btn" onclick="toggleMode()" title="Compact mode">&#8598;</button>
    </div>
    <div class="scanline" id="scanline"><div class="scanline-bar"></div></div>
  </header>

  <div class="tab-bar" id="tab-bar">
    <div class="session-tab active" data-session="all">All</div>
  </div>

  <div class="minimal-topbar" id="minimal-topbar">
    <button id="theme-toggle-mini" class="theme-toggle" title="Toggle theme (⌘T)" aria-label="Switch to light theme">
      <svg class="sun-and-moon" aria-hidden="true" width="18" height="18" viewBox="0 0 24 24">
        <mask class="moon" id="moon-mask-mini">
          <rect x="0" y="0" width="100%" height="100%" fill="white" />
          <circle cx="24" cy="10" r="6" fill="black" />
        </mask>
        <circle class="sun" cx="12" cy="12" r="6" mask="url(#moon-mask-mini)" fill="currentColor" />
        <g class="sun-beams" stroke="currentColor">
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </g>
      </svg>
    </button>
    <div class="minimal-topbar-right">
      <button class="scope-btn" id="view-toggle-btn-mini" onclick="toggleView()" title="Map (m)"><div class="scope-icon"><svg class="scope-tube" viewBox="0 0 20 10" fill="currentColor"><rect x="2" y="3" width="16" height="5" rx="1.5"/><rect x="0" y="2" width="5" height="7" rx="1"/></svg><svg class="scope-stand" viewBox="0 0 12 8" fill="currentColor"><path d="M3 0 L6 8 L9 0" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg></div></button>
      <span class="lock-wrap" title="Pin window (⌘⇧H)"><input type="checkbox" id="lock-toggle-mini" checked onchange="toggleLock()"><label class="lock-label" for="lock-toggle-mini"><div class="lock-wrapper"><div class="shackle"></div><svg class="lock-body" viewBox="0 0 15 10" fill="white"><rect width="15" height="10" rx="2"/></svg></div></label></span>
      <button class="mode-toggle-btn" id="mode-toggle-btn-mini" onclick="toggleMode()" title="Expand to full window">&#8599;</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">/</span>
      <input type="text" id="search-input" placeholder="Search..." />
      <span class="search-count" id="search-count"></span>
    </div>
    <div class="filter-dropdown" id="filter-dropdown">
      <div class="filter-trigger" id="filter-trigger">All types</div>
      <div class="filter-menu" id="filter-menu"></div>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-right">
      <span class="grid-controls" id="grid-controls" style="display:none">
        <button class="btn btn-sm" onclick="setGridCols(gridCols-1)" title="Fewer columns">-</button>
        <span class="grid-label" id="grid-label">4 col</span>
        <button class="btn btn-sm" onclick="setGridCols(gridCols+1)" title="More columns">+</button>
      </span>
      <div class="toolbar-sep" id="grid-sep" style="display:none"></div>
      <button class="expand-all-btn" id="expand-all-btn" onclick="toggleExpandAll()" title="Expand/Collapse all queries">Expand All</button>
      <button class="replay-btn" id="replay-btn" onclick="requestReplayAnalysis()" title="Analyze session with Claude">Replay</button>
      <button class="btn" onclick="clearLogs()" title="Clear">Clear</button>
    </div>
  </div>

  <div class="gravity-container" id="gravity-container" style="display:none">
    <button class="gravity-enlarge-btn" id="gravity-enlarge-btn" onclick="toggleMapPopover()" title="Enlarge map">⤢</button>
    <canvas id="gravity-canvas"></canvas>
    <canvas id="momentum-canvas" style="display:none"></canvas>
    <div class="gravity-tooltip" id="gravity-tooltip"></div>
    <div class="momentum-tooltip" id="momentum-tooltip"></div>
    <div class="gravity-card" id="gravity-card" style="display:none"></div>
    <div class="gravity-filter-row">
      <div class="mode-filter-bar" id="mode-filter-bar">
        <button class="mode-btn active" data-mode="files" onclick="setMapMode('files')">Files</button>
        <button class="mode-btn" data-mode="flow" onclick="setMapMode('flow')">Flow</button>
      </div>
      <div class="universe-filter-bar" id="universe-filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="Gravity.setFilter && Gravity.setFilter('all')">All</button>
        <button class="filter-btn" data-filter="read" onclick="Gravity.setFilter && Gravity.setFilter('read')">Read</button>
        <button class="filter-btn" data-filter="edit" onclick="Gravity.setFilter && Gravity.setFilter('edit')">Edit</button>
        <button class="filter-btn" data-filter="exec" onclick="Gravity.setFilter && Gravity.setFilter('exec')">Exec</button>
      </div>
      <div class="recency-filter-bar">
        <button class="recency-filter-btn active" data-recency="all" onclick="Gravity.setRecencyFilter && Gravity.setRecencyFilter('all')">All</button>
        <button class="recency-filter-btn" data-recency="active" onclick="Gravity.setRecencyFilter && Gravity.setRecencyFilter('active')">Live</button>
        <button class="recency-filter-btn" data-recency="warm" onclick="Gravity.setRecencyFilter && Gravity.setRecencyFilter('warm')">Warm</button>
        <button class="recency-filter-btn" data-recency="stale" onclick="Gravity.setRecencyFilter && Gravity.setRecencyFilter('stale')">Stale</button>
      </div>
      <div class="session-filter-bar" id="session-filter-bar" style="display:none"></div>
    </div>
    <div class="gravity-sliders" id="gravity-sliders">
      <label><span>Spread</span><input type="range" min="10" max="300" value="155" oninput="Gravity.setEdgeLengthScale(0.1+(this.value-10)/290*1.4)"></label>
    </div>
    <div class="gravity-sliders" id="momentum-sliders" style="display:none">
      <label><span>Spread</span><input type="range" min="10" max="300" value="155" oninput="Momentum.setEdgeLengthScale(0.2+(this.value-10)/290*2.8)"></label>
    </div>
    <div class="universe-vignette"></div>
  </div>

  <div class="map-divider" id="map-divider" style="display:none"></div>

  <div class="pane-container" id="pane-container"></div>

  <button id="scroll-fab" onclick="jumpToBottom()">&#8595;</button>
</div>

<!-- Map Popover -->
<div class="map-popover-overlay" id="map-popover-overlay" style="display:none" onclick="if(event.target===this)toggleMapPopover()">
  <div class="map-popover" id="map-popover">
    <div class="map-popover-controls">
      <button class="map-popover-close" onclick="toggleMapPopover()">&times;</button>
    </div>
  </div>
</div>

<!-- Replay Popover -->
<div class="replay-popover-overlay" id="replay-popover-overlay" style="display:none" onclick="if(event.target===this)closeReplayPopover()">
  <div class="replay-popover" id="replay-popover">
    <div class="replay-popover-header">
      <span class="replay-popover-title">Session Replay</span>
      <span class="replay-popover-session" id="replay-session-label"></span>
      <span class="replay-popover-archetype" id="replay-archetype-badge"></span>
      <button class="replay-popover-close" onclick="closeReplayPopover()">&times;</button>
    </div>
    <div class="replay-popover-body">
      <div class="replay-timeline-panel" id="replay-timeline-panel">
        <div class="replay-timeline-header">Timeline</div>
        <div class="replay-timeline-scroll" id="replay-timeline-scroll"></div>
      </div>
      <div class="replay-analysis-panel" id="replay-analysis-panel">
        <div class="replay-analysis-header">
          <span>Analysis</span>
          <div class="replay-analysis-header-right">
            <div class="replay-risk-meter" id="replay-risk-meter"></div>
            <button class="replay-action-btn replay-action-cancel" id="replay-action-btn" onclick="cancelReplayAnalysis()" title="Cancel analysis">Cancel</button>
            <button class="replay-action-btn replay-action-export" id="replay-export-btn" onclick="exportReplayMd()" title="Export as Markdown">Export .md</button>
          </div>
        </div>
        <div class="replay-analysis-scroll" id="replay-analysis-scroll">
          <div class="replay-loading">Analyzing session...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-panel" id="modal-panel">
    <div class="modal-header">
      <span class="modal-badge" id="modal-badge"></span>
      <span class="modal-tool" id="modal-tool"></span>
      <span class="modal-time" id="modal-time"></span>
      <button class="modal-copy" id="modal-copy" title="Copy content">&#x2398;</button>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="gravity.js"></script>
<script src="momentum.js"></script>
<script src="tiling.js"></script>
<script src="app.js"></script>
</body>
</html>
