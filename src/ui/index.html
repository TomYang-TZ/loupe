<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loupe</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <div class="logo">loupe<span class="logo-cursor">_</span></div>
    <div class="stats">
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme (⌘T)" aria-label="Switch to light theme">
        <svg class="sun-and-moon" aria-hidden="true" width="14" height="14" viewBox="0 0 24 24">
          <mask class="moon" id="moon-mask">
            <rect x="0" y="0" width="100%" height="100%" fill="white" />
            <circle cx="24" cy="10" r="6" fill="black" />
          </mask>
          <circle class="sun" cx="12" cy="12" r="6" mask="url(#moon-mask)" fill="currentColor" />
          <g class="sun-beams" stroke="currentColor">
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </g>
        </svg>
      </button>
      <span><span class="conn-dot connecting" id="conn-dot"></span><span id="conn-status">connecting</span></span>
      <span><span class="stat-val" id="line-count">0</span> events</span>
      <button class="mode-toggle-btn" id="mode-toggle-btn" onclick="toggleMode()" title="Compact mode">&#8598;</button>
    </div>
    <div class="scanline" id="scanline"><div class="scanline-bar"></div></div>
  </header>

  <div class="tab-bar" id="tab-bar">
    <div class="session-tab active" data-session="all">All</div>
  </div>

  <div class="minimal-topbar" id="minimal-topbar">
    <button id="theme-toggle-mini" class="theme-toggle" title="Toggle theme (⌘T)" aria-label="Switch to light theme">
      <svg class="sun-and-moon" aria-hidden="true" width="18" height="18" viewBox="0 0 24 24">
        <mask class="moon" id="moon-mask-mini">
          <rect x="0" y="0" width="100%" height="100%" fill="white" />
          <circle cx="24" cy="10" r="6" fill="black" />
        </mask>
        <circle class="sun" cx="12" cy="12" r="6" mask="url(#moon-mask-mini)" fill="currentColor" />
        <g class="sun-beams" stroke="currentColor">
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </g>
      </svg>
    </button>
    <div class="minimal-topbar-right">
      <button class="mode-toggle-btn" id="mode-toggle-btn-mini" onclick="toggleMode()" title="Expand to full window">&#8599;</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">/</span>
      <input type="text" id="search-input" placeholder="Search..." />
      <span class="search-count" id="search-count"></span>
    </div>
    <div class="filter-dropdown" id="filter-dropdown">
      <div class="filter-trigger" id="filter-trigger">All types</div>
      <div class="filter-menu" id="filter-menu"></div>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-right">
      <span class="grid-controls" id="grid-controls" style="display:none">
        <button class="btn btn-sm" onclick="setGridCols(gridCols-1)" title="Fewer columns">-</button>
        <span class="grid-label" id="grid-label">4 col</span>
        <button class="btn btn-sm" onclick="setGridCols(gridCols+1)" title="More columns">+</button>
      </span>
      <div class="toolbar-sep" id="grid-sep" style="display:none"></div>
      <button class="btn" id="view-toggle-btn" onclick="toggleView()" title="Toggle gravity map (m)">Map</button>
      <button class="btn" id="autohide-btn" onclick="toggleAutoHide()" title="Auto-hide when inactive">Auto-hide</button>
      <button class="btn" onclick="clearLogs()" title="Clear all">Clear</button>
    </div>
  </div>

  <div class="pane-container" id="pane-container"></div>

  <div class="gravity-container" id="gravity-container" style="display:none">
    <canvas id="gravity-canvas"></canvas>
    <div id="gravity-3d" style="display:none"></div>
    <div class="gravity-hud" id="gravity-hud" style="display:none"></div>
    <div class="gravity-legend-3d" id="gravity-legend-3d" style="display:none">
      <div class="gl-row"><span class="gl-dot" style="background:#3b82f6"></span>Read</div>
      <div class="gl-row"><span class="gl-dot" style="background:#4ade80"></span>Edited</div>
      <div class="gl-row"><span class="gl-dot" style="background:#f97316"></span>Executed</div>
      <div class="gl-section"></div>
      <div class="gl-row"><span class="gl-ray" style="background:linear-gradient(90deg,transparent,#8b5cf6)"></span>Prerequisite (Read→Edit)</div>
      <div class="gl-row"><span class="gl-ray" style="background:linear-gradient(90deg,transparent,#f97316)"></span>Coupling (Edit→Edit)</div>
      <div class="gl-row"><span class="gl-ray" style="background:linear-gradient(90deg,transparent,#4ade80)"></span>Validation (Edit→Run)</div>
      <div class="gl-row"><span class="gl-ray" style="background:linear-gradient(90deg,transparent,#3b82f6)"></span>Discovery (Search→Read)</div>
      <div class="gl-row"><span class="gl-ray" style="background:linear-gradient(90deg,transparent,#475569)"></span>Sequential</div>
    </div>
    <div class="gravity-tooltip" id="gravity-tooltip"></div>
    <div class="gravity-mode-toggle" id="gravity-mode-toggle">
      <button class="btn btn-sm gravity-dim-btn active" data-dim="2d" onclick="setGravityDim('2d')">2D</button>
      <button class="btn btn-sm gravity-dim-btn" data-dim="3d" onclick="setGravityDim('3d')">3D</button>
    </div>
  </div>

  <button id="scroll-fab" onclick="jumpToBottom()">&#8595;</button>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-panel" id="modal-panel">
    <div class="modal-header">
      <span class="modal-badge" id="modal-badge"></span>
      <span class="modal-tool" id="modal-tool"></span>
      <span class="modal-time" id="modal-time"></span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three-spritetext@1.9.5/dist/three-spritetext.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.79.1/dist/3d-force-graph.min.js"></script>
<script src="gravity.js"></script>
<script src="gravity3d.js"></script>
<script src="app.js"></script>
</body>
</html>
